services:
  mongodb:
    image: mongo:latest
    container_name: aegis-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:latest
    container_name: aegis-redis
    ports:
      - "6379:6379"
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: aegis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./llama-fine_tuned:/root/.ollama/models/llama-fine_tuned
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

  backend:
    build: .
    container_name: aegis-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - mongodb
      - redis
      - ollama
    restart: always

volumes:
  mongodb_data:
  ollama_data:
