name: AegisAI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 0" # Weekly retraining

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run linting
        run: |
          pip install flake8 black
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black . --check || true

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml
        env:
          MONGODB_URI: mongodb://localhost:27017/aegis_test
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  train:
    name: Model Training
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download training dataset
        run: |
          python scripts/generate_synthetic_dataset.py

      - name: Train Catalyst model
        run: |
          python scripts/train_catalyst_model.py

      - name: Evaluate model
        run: |
          python scripts/evaluate_model.py

      - name: Store model artifact
        uses: actions/upload-artifact@v3
        with:
          name: catalyst-model
          path: models/pretrained/catalyst_success_predictor.pkl

      - name: Commit trained model
        run: |
          git config --local user.email "ci@aegisai.dev"
          git config --local user.name "AegisAI CI"
          if git diff --quiet models/pretrained/catalyst_success_predictor.pkl; then
            echo "Model unchanged"
          else
            git add models/pretrained/catalyst_success_predictor.pkl
            git commit -m "🤖 Update Catalyst model ($(date +'%Y-%m-%d'))"
            git push
          fi

  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Bandit security scan
        run: bandit -r . -f json -o bandit-report.json || true

      - name: Check dependencies for CVEs
        run: safety check --json || true

  build:
    name: Build & Package
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t aegisai:latest -t aegisai:${{ github.sha }} .

      - name: Run security scan on image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --severity HIGH,CRITICAL aegisai:latest

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: "aegisai-prod"
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: "aegisai:${{ github.sha }}"

      - name: Smoke test
        run: |
          sleep 10
          curl -f https://aegisai-prod.azurewebsites.net/health || exit 1
