<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — AegisAI</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="https://unpkg.com/lucide@0.395.0/dist/umd/lucide.js"></script>
  <style>
    .envelope-icon { color: var(--amber); }
    .countdown-ring { position: relative; width: 48px; height: 48px; display: inline-flex; align-items: center; justify-content: center; }
    .countdown-ring svg { position: absolute; transform: rotate(-90deg); }
    .countdown-ring__track { fill: none; stroke: var(--border-ghost); stroke-width: 3; }
    .countdown-ring__fill { fill: none; stroke: var(--indigo); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  </style>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="glass-card" style="width:100%;max-width:480px;padding:56px;text-align:center;">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--amber-glow);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
      <i data-lucide="mail" style="width:32px;height:32px;" class="envelope-icon"></i>
    </div>
    <h1 style="font-family:var(--font-display);font-size:26px;margin-bottom:8px;">Check your inbox</h1>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:28px;">
      We sent a verification link to <strong style="color:var(--text-primary);" id="verify-email-addr">your@email.com</strong>
    </p>

    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px;">
      <div class="countdown-ring">
        <svg width="48" height="48">
          <circle class="countdown-ring__track" cx="24" cy="24" r="20"/>
          <circle class="countdown-ring__fill" cx="24" cy="24" r="20" id="v-countdown-fill" stroke-dasharray="125.66" stroke-dashoffset="0"/>
        </svg>
        <span style="font-family:var(--font-mono);font-size:13px;color:var(--text-primary);z-index:1;" id="v-countdown-num">60</span>
      </div>
      <button class="btn-ghost" id="v-resend-btn" disabled style="opacity:0.5;">Resend email</button>
    </div>

    <a href="login.html" style="font-size:13px;color:var(--indigo);">Already verified? Sign in →</a>
  </div>

  <script src="assets/js/global.js"></script>
  <script>
  (function() {
    // Show user email from localStorage
    const user = JSON.parse(localStorage.getItem('aegis_user') || '{}');
    if (user.email) document.getElementById('verify-email-addr').textContent = user.email;

    // Countdown
    let seconds = 60;
    const num = document.getElementById('v-countdown-num');
    const fill = document.getElementById('v-countdown-fill');
    const btn = document.getElementById('v-resend-btn');
    const circ = 2 * Math.PI * 20;

    const interval = setInterval(() => {
      seconds--;
      num.textContent = seconds;
      fill.style.strokeDashoffset = circ * (1 - seconds / 60);
      if (seconds <= 0) { clearInterval(interval); btn.disabled = false; btn.style.opacity = '1'; }
    }, 1000);

    btn.addEventListener('click', () => {
      btn.disabled = true; btn.style.opacity = '0.5';
      seconds = 60; num.textContent = 60; fill.style.strokeDashoffset = '0';
      if (typeof Aegis !== 'undefined') Aegis.toast('Verification email resent!', 'success');
      const i2 = setInterval(() => {
        seconds--; num.textContent = seconds;
        fill.style.strokeDashoffset = circ * (1 - seconds / 60);
        if (seconds <= 0) { clearInterval(i2); btn.disabled = false; btn.style.opacity = '1'; }
      }, 1000);
    });
  })();
  </script>
</body>
</html>
