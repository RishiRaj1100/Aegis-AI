<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — AegisAI</title>
  <meta name="description" content="Reset your AegisAI account password.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="https://unpkg.com/lucide@0.395.0/dist/umd/lucide.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .forgot-card { width: 100%; max-width: 480px; padding: 56px; }
    .state { display: none; flex-direction: column; align-items: center; text-align: center; }
    .state.active { display: flex; }
    .icon-circle { width: 72px; height: 72px; border-radius: 50%; background: var(--indigo-dim); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
    .checkmark-svg { width: 64px; height: 64px; }
    .checkmark-circle { stroke: var(--emerald); stroke-width: 2; fill: none; stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw-circle 0.5s ease forwards; }
    .checkmark-check { stroke: var(--emerald); stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 50; stroke-dashoffset: 50; animation: draw-check 0.3s ease forwards 0.5s; }
    @keyframes draw-circle { to { stroke-dashoffset: 0; } }
    @keyframes draw-check { to { stroke-dashoffset: 0; } }
    .countdown-ring { position: relative; width: 48px; height: 48px; display: inline-flex; align-items: center; justify-content: center; }
    .countdown-ring svg { position: absolute; transform: rotate(-90deg); }
    .countdown-ring__track { fill: none; stroke: var(--border-ghost); stroke-width: 3; }
    .countdown-ring__fill { fill: none; stroke: var(--indigo); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  </style>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="glass-card forgot-card">
    <!-- State 1: Email Entry -->
    <div class="state active" id="state-email">
      <div class="icon-circle">
        <i data-lucide="shield" style="width:32px;height:32px;color:var(--indigo);"></i>
      </div>
      <h1 style="font-family:var(--font-display);font-size:26px;margin-bottom:8px;">Reset your password</h1>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:28px;">We'll send a secure reset link to your inbox.</p>
      <form id="reset-form" style="width:100%;display:flex;flex-direction:column;gap:16px;">
        <input class="neo-input" id="reset-email" type="email" placeholder="Enter your email" required aria-label="Email" autocomplete="email">
        <button type="submit" class="btn-primary btn-primary--wide btn-primary--lg" id="reset-btn">Send Reset Link</button>
      </form>
      <a href="login.html" style="margin-top:20px;font-size:13px;color:var(--text-secondary);">← Back to Sign In</a>
    </div>

    <!-- State 2: Email Sent -->
    <div class="state" id="state-sent">
      <svg class="checkmark-svg" viewBox="0 0 64 64">
        <circle class="checkmark-circle" cx="32" cy="32" r="28"/>
        <polyline class="checkmark-check" points="20,34 28,42 44,26"/>
      </svg>
      <h1 style="font-family:var(--font-display);font-size:26px;margin-bottom:8px;">Check your inbox</h1>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:28px;">We sent a link to <strong id="sent-email" style="color:var(--text-primary);"></strong>. Expires in 15 minutes.</p>
      <a href="https://mail.google.com" target="_blank" class="btn-ghost" style="margin-bottom:16px;">
        <i data-lucide="external-link" style="width:14px;height:14px;"></i> Open Gmail
      </a>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div class="countdown-ring" id="countdown-ring">
          <svg width="48" height="48"><circle class="countdown-ring__track" cx="24" cy="24" r="20"/><circle class="countdown-ring__fill" cx="24" cy="24" r="20" id="countdown-fill" stroke-dasharray="125.66" stroke-dashoffset="0"/></svg>
          <span style="font-family:var(--font-mono);font-size:13px;color:var(--text-primary);z-index:1;" id="countdown-num">60</span>
        </div>
        <button class="btn-ghost" id="resend-btn" disabled style="opacity:0.5;">Resend</button>
      </div>
      <a href="#" id="wrong-email-link" style="font-size:13px;color:var(--text-secondary);">Wrong email? Go back</a>
    </div>

    <!-- State 3: New Password (token in URL) -->
    <div class="state" id="state-new-pw">
      <div class="icon-circle">
        <i data-lucide="key-round" style="width:32px;height:32px;color:var(--indigo);"></i>
      </div>
      <h1 style="font-family:var(--font-display);font-size:26px;margin-bottom:8px;">Set new password</h1>
      <p style="color:var(--text-secondary);font-size:14px;margin-bottom:28px;">Choose a strong password for your account.</p>
      <form id="new-pw-form" style="width:100%;display:flex;flex-direction:column;gap:16px;">
        <input class="neo-input" id="new-password" type="password" placeholder="New password" required aria-label="New password">
        <div class="strength-meter">
          <div class="strength-meter__segment" id="np-str-1"></div>
          <div class="strength-meter__segment" id="np-str-2"></div>
          <div class="strength-meter__segment" id="np-str-3"></div>
          <div class="strength-meter__segment" id="np-str-4"></div>
        </div>
        <input class="neo-input" id="new-confirm" type="password" placeholder="Confirm password" required aria-label="Confirm new password">
        <button type="submit" class="btn-primary btn-primary--wide btn-primary--lg" id="set-pw-btn">Set New Password</button>
      </form>
    </div>

    <!-- State 4: Success -->
    <div class="state" id="state-success">
      <svg class="checkmark-svg" viewBox="0 0 64 64">
        <circle class="checkmark-circle" cx="32" cy="32" r="28"/>
        <polyline class="checkmark-check" points="20,34 28,42 44,26"/>
      </svg>
      <h1 style="font-family:var(--font-display);font-size:26px;margin-bottom:8px;">Password updated!</h1>
      <p style="color:var(--text-secondary);font-size:14px;">Taking you to the app...</p>
    </div>
  </div>

  <script src="assets/js/global.js"></script>
  <script>
  (function() {
    'use strict';
    const states = { email: document.getElementById('state-email'), sent: document.getElementById('state-sent'), newPw: document.getElementById('state-new-pw'), success: document.getElementById('state-success') };

    function showState(name) {
      Object.values(states).forEach(s => s.classList.remove('active'));
      states[name].classList.add('active');
      if (typeof gsap !== 'undefined') gsap.from(states[name], { opacity: 0, y: 20, duration: 0.4, ease: 'power2.out' });
    }

    // Check for token in URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('token')) showState('newPw');

    // State 1: Send email
    document.getElementById('reset-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('reset-email').value.trim();
      if (!email) return;
      document.getElementById('sent-email').textContent = email;
      showState('sent');
      startCountdown();
    });

    // Countdown timer
    function startCountdown() {
      let seconds = 60;
      const num = document.getElementById('countdown-num');
      const fill = document.getElementById('countdown-fill');
      const resendBtn = document.getElementById('resend-btn');
      const circumference = 2 * Math.PI * 20;

      const interval = setInterval(() => {
        seconds--;
        num.textContent = seconds;
        fill.style.strokeDashoffset = circumference * (1 - seconds / 60);
        if (seconds <= 0) {
          clearInterval(interval);
          resendBtn.disabled = false;
          resendBtn.style.opacity = '1';
        }
      }, 1000);

      resendBtn.addEventListener('click', () => {
        resendBtn.disabled = true;
        resendBtn.style.opacity = '0.5';
        seconds = 60;
        num.textContent = 60;
        fill.style.strokeDashoffset = '0';
        startCountdown();
        if (typeof Aegis !== 'undefined') Aegis.toast('Reset link resent!', 'success');
      }, { once: true });
    }

    // Wrong email link
    document.getElementById('wrong-email-link').addEventListener('click', (e) => {
      e.preventDefault();
      showState('email');
    });

    // State 3: Set new password
    const npw = document.getElementById('new-password');
    npw.addEventListener('input', () => {
      const v = npw.value;
      const score = [v.length >= 8, /[A-Z]/.test(v), /[0-9]/.test(v), /[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
      for (let i = 1; i <= 4; i++) {
        document.getElementById('np-str-' + i).className = 'strength-meter__segment' + (i <= score ? ` active-${score}` : '');
      }
    });

    document.getElementById('new-pw-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const pw = npw.value;
      const conf = document.getElementById('new-confirm').value;
      if (pw !== conf) { if (typeof Aegis !== 'undefined') Aegis.toast('Passwords do not match.', 'error'); return; }
      if (pw.length < 8) { if (typeof Aegis !== 'undefined') Aegis.toast('Password must be 8+ characters.', 'error'); return; }
      showState('success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    });
  })();
  </script>
</body>
</html>
