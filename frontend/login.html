<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AegisAI</title>
  <meta name="description" content="Sign in to your AegisAI account to access your decision intelligence dashboard.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="https://unpkg.com/lucide@0.395.0/dist/umd/lucide.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .pipeline-anim-node {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--bg-glass); border: 1px solid var(--border-ghost);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.4s ease;
    }
    .pipeline-anim-node.active {
      border-color: var(--border-indigo);
      background: var(--indigo-dim);
      box-shadow: var(--glow-indigo);
    }
    .pipeline-anim-line {
      width: 2px; height: 32px;
      background: var(--border-ghost);
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="auth-layout">
    <!-- LEFT: Form Panel -->
    <div class="auth-form-panel">
      <div class="auth-form">
        <a href="index.html" class="navbar__logo" style="font-size:20px;margin-bottom:40px;display:inline-flex;">
          Aegis<span class="navbar__logo-ai">AI</span><span class="navbar__logo-dot"></span>
        </a>
        <h1 style="font-family:var(--font-display);font-size:30px;margin-bottom:8px;">Welcome back.</h1>
        <p style="color:var(--text-secondary);font-size:15px;margin-bottom:32px;">Your plans are waiting.</p>

        <!-- Error Banner -->
        <div id="login-error" style="display:none;background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.3);border-radius:var(--r-md);padding:12px 16px;margin-bottom:20px;color:var(--rose);font-size:13px;display:none;">
          <span id="login-error-msg">Incorrect credentials. Try again.</span>
        </div>

        <form id="login-form" style="display:flex;flex-direction:column;gap:16px;" novalidate>
          <!-- Email -->
          <div>
            <label style="font-size:13px;color:var(--text-secondary);margin-bottom:6px;display:block;" for="login-email">Email</label>
            <div style="position:relative;">
              <i data-lucide="mail" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted);pointer-events:none;"></i>
              <input class="neo-input" id="login-email" type="email" placeholder="you@company.com" required autocomplete="email" style="padding-left:40px;" aria-label="Email">
            </div>
          </div>

          <!-- Password -->
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <label style="font-size:13px;color:var(--text-secondary);" for="login-password">Password</label>
              <a href="forgot-password.html" style="font-size:12px;color:var(--indigo);">Forgot password?</a>
            </div>
            <div style="position:relative;">
              <i data-lucide="lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted);pointer-events:none;"></i>
              <input class="neo-input" id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password" style="padding-left:40px;padding-right:44px;" aria-label="Password">
              <button type="button" id="toggle-pw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;" aria-label="Toggle password visibility">
                <i data-lucide="eye" style="width:16px;height:16px;"></i>
              </button>
            </div>
          </div>

          <!-- Remember me -->
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="toggle" id="remember-toggle" role="switch" aria-checked="false" tabindex="0" aria-label="Remember me"></div>
            <span style="font-size:13px;color:var(--text-secondary);">Remember me</span>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary btn-primary--wide btn-primary--lg" id="login-btn">Sign In</button>
        </form>

        <p style="text-align:center;margin-top:24px;font-size:14px;color:var(--text-secondary);">
          Don't have an account? <a href="register.html" style="color:var(--indigo);font-weight:500;">Create one →</a>
        </p>
      </div>
    </div>

    <!-- RIGHT: Brand Panel with animated pipeline -->
    <div class="auth-brand" style="background:#0A0E1A;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:0;" id="login-pipeline-anim">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <script src="assets/js/global.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
  (function() {
    'use strict';

    // Pre-fill email from localStorage
    const savedEmail = localStorage.getItem('aegis_last_email');
    if (savedEmail) document.getElementById('login-email').value = savedEmail;

    // Toggle password visibility
    const pwInput = document.getElementById('login-password');
    const toggleBtn = document.getElementById('toggle-pw');
    toggleBtn.addEventListener('click', () => {
      const isPassword = pwInput.type === 'password';
      pwInput.type = isPassword ? 'text' : 'password';
      toggleBtn.querySelector('i').setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
      if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [toggleBtn] });
    });

    // Remember me toggle
    const rememberToggle = document.getElementById('remember-toggle');
    rememberToggle.addEventListener('click', () => {
      rememberToggle.classList.toggle('active');
      rememberToggle.setAttribute('aria-checked', rememberToggle.classList.contains('active'));
    });

    // Login form
    const form = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const errorBanner = document.getElementById('login-error');
    const errorMsg = document.getElementById('login-error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBanner.style.display = 'none';

      const email = document.getElementById('login-email').value.trim();
      const password = pwInput.value;
      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorBanner.style.display = 'block';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i data-lucide="loader-2" style="width:16px;height:16px;animation:spin 1s linear infinite;"></i> Signing in...';
      if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [loginBtn] });

      try {
        await Auth.login(email, password);
        if (rememberToggle.classList.contains('active')) {
          localStorage.setItem('aegis_last_email', email);
        }
        loginBtn.style.background = 'var(--emerald)';
        loginBtn.style.boxShadow = '0 6px 0 #059669, 0 10px 30px rgba(16,185,129,0.35)';
        loginBtn.innerHTML = '✓ Welcome back';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      } catch (err) {
        errorMsg.textContent = err.message || 'Incorrect credentials. Try again.';
        errorBanner.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Sign In';
        // Shake form
        if (typeof gsap !== 'undefined') {
          gsap.to(form, { x: [-6, 6, -4, 4, 0], duration: 0.4, ease: 'power2.out' });
        }
      }
    });

    // Animated pipeline on right panel
    const pipelineContainer = document.getElementById('login-pipeline-anim');
    if (pipelineContainer) {
      const agents = [
        { icon: 'terminal', label: 'Commander' },
        { icon: 'search', label: 'Research' },
        { icon: 'list-checks', label: 'Execution' },
        { icon: 'shield-check', label: 'Trust' },
        { icon: 'database', label: 'Memory' },
        { icon: 'brain', label: 'Reflection' },
      ];

      pipelineContainer.innerHTML = agents.map((a, i) => `
        ${i > 0 ? '<div class="pipeline-anim-line"></div>' : ''}
        <div class="pipeline-anim-node" id="pnode-${i}">
          <i data-lucide="${a.icon}" style="width:20px;height:20px;color:var(--text-muted);"></i>
        </div>
        <span style="font-size:11px;color:var(--text-muted);margin-top:4px;font-family:var(--font-mono);">${a.label}</span>
      `).join('');

      if (typeof lucide !== 'undefined') lucide.createIcons({ nodes: [pipelineContainer] });

      // Animate nodes cycling
      let activeIdx = 0;
      setInterval(() => {
        document.querySelectorAll('.pipeline-anim-node').forEach((n, i) => {
          n.classList.toggle('active', i === activeIdx);
        });
        activeIdx = (activeIdx + 1) % agents.length;
      }, 1200);
    }

    // GSAP entrance
    if (typeof gsap !== 'undefined' && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      gsap.from('.auth-form > *', {
        x: 40, opacity: 0, stagger: 0.06, duration: 0.5, ease: 'power2.out', delay: 0.1,
      });
    }
  })();
  </script>
</body>
</html>
